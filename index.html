<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="從餐旅跨域至軟體開發，專注 LLM 微調與企業 AI 應用落地" data-i18n="meta.description" />
  <title data-i18n="meta.title">Shane | 軟體工程師 ・ LLM Research</title>

  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
  <!-- Navigation -->
  <header class="navbar" id="navbar">
    <div class="nav-container">
      <a href="#hero" class="nav-logo" data-i18n="nav.logo">Logo</a>

      <nav class="nav-menu" id="navMenu">
        <a href="#about" class="nav-link" data-i18n="nav.about">關於</a>
        <a href="#skills" class="nav-link" data-i18n="nav.skills">技能</a>
        <a href="#experience" class="nav-link" data-i18n="nav.experience">經歷</a>
        <a href="#education" class="nav-link" data-i18n="nav.education">學歷</a>
        <a href="#projects" class="nav-link" data-i18n="nav.projects">作品</a>
        <a href="#contact" class="nav-link" data-i18n="nav.contact">聯絡</a>
      </nav>

      <div class="nav-actions">
        <button class="lang-toggle" id="langToggle" aria-label="Switch language">
          <span id="langLabel">EN</span>
        </button>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
          <span id="themeIcon">☾</span>
        </button>
        <button class="menu-toggle" id="menuToggle" aria-label="Open menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <main>
    <!-- Hero -->
    <section id="hero" class="hero">
      <div class="container hero-content">
        <p class="hero-greeting" data-i18n="hero.greeting">您好，我是</p>
        <h1 class="hero-name" data-i18n="hero.name">Your Name</h1>
        <h2 class="hero-title" data-i18n="hero.title">Your Title</h2>
        <p class="hero-tagline" data-i18n="hero.tagline">這裡是你的個人標語</p>
        <div class="hero-actions">
          <a href="#contact" class="btn btn-primary" data-i18n="hero.cta1">聯絡我</a>
          <a href="#projects" class="btn btn-outline" data-i18n="hero.cta2">看作品</a>
        </div>
      </div>
    </section>

    <!-- About -->
    <section id="about" class="section">
      <div class="container">
        <h2 class="section-title" data-i18n="about.title">關於我</h2>
        <div class="about-grid">
          <div class="about-image">
            <div class="avatar-placeholder">
              <span data-i18n="about.avatarPlaceholder">照片</span>
            </div>
          </div>
          <div class="about-text">
            <p data-i18n="about.paragraph1">這裡是你的自我介紹第一段。</p>
            <p data-i18n="about.paragraph2">這裡是你的自我介紹第二段。</p>
          </div>
        </div>
      </div>
    </section>

    <!-- Skills -->
    <section id="skills" class="section section-alt">
      <div class="container">
        <h2 class="section-title" data-i18n="skills.title">技能</h2>
        <div class="skills-grid" id="skillsGrid">
          <!-- 卡片由 JS 從 translations 渲染 -->
        </div>
      </div>
    </section>

    <!-- Experience -->
    <section id="experience" class="section">
      <div class="container">
        <h2 class="section-title" data-i18n="experience.title">工作經歷</h2>
        <div class="timeline" id="experienceTimeline">
          <!-- 由 JS 渲染 -->
        </div>
      </div>
    </section>

    <!-- Education -->
    <section id="education" class="section section-alt">
      <div class="container">
        <h2 class="section-title" data-i18n="education.title">學歷</h2>
        <div class="timeline" id="educationTimeline">
          <!-- 由 JS 渲染 -->
        </div>
      </div>
    </section>

    <!-- Projects -->
    <section id="projects" class="section">
      <div class="container">
        <h2 class="section-title" data-i18n="projects.title">作品集</h2>
        <div class="projects-grid" id="projectsGrid">
          <!-- 由 JS 渲染 -->
        </div>
      </div>
    </section>

    <!-- Contact -->
    <section id="contact" class="section section-alt">
      <div class="container">
        <h2 class="section-title" data-i18n="contact.title">聯絡我</h2>
        <p class="contact-intro" data-i18n="contact.intro">歡迎與我聯繫</p>
        <div class="contact-links" id="contactLinks">
          <!-- 由 JS 渲染 -->
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>
        <span data-i18n="footer.copyright">© 2026 Your Name. All rights reserved.</span>
      </p>
    </div>
  </footer>

  <script src="data/translations.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
