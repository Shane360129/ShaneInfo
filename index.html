<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="從餐旅跨域至軟體開發，專注 LLM 微調與企業 AI 應用落地" data-i18n="meta.description" />
  <title data-i18n="meta.title">Shane | 軟體工程師 ・ LLM Research</title>

  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
  <!-- Mobile top bar -->
  <header class="mobile-bar" id="mobileBar">
    <a href="#resume" class="mobile-brand" data-i18n="hero.name">Shane</a>
    <button class="menu-toggle" id="menuToggle" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
  </header>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-inner">
      <div class="sidebar-header">
        <div class="avatar">
          <img src="assets/images/avatar-512.jpg" alt="Shane" class="avatar-img" />
        </div>
        <h1 class="sidebar-name" data-i18n="hero.name">Shane</h1>
        <p class="sidebar-title" data-i18n="hero.title">軟體工程師 ・ LLM Research</p>
      </div>

      <nav class="sidebar-nav" id="sidebarNav">
        <a href="#about" class="nav-link" data-page="about" data-i18n="nav.about">關於</a>
        <a href="#resume" class="nav-link" data-page="resume" data-i18n="nav.resume">履歷</a>
        <a href="#projects" class="nav-link" data-page="projects" data-i18n="nav.projects">作品</a>
        <a href="#contact" class="nav-link" data-page="contact" data-i18n="nav.contact">聯絡</a>
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-actions">
          <button class="lang-toggle" id="langToggle" aria-label="Switch language">
            <span id="langLabel">EN</span>
          </button>
          <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
            <span id="themeIcon">☾</span>
          </button>
        </div>
        <p class="sidebar-copyright" data-i18n="footer.copyright">© 2026 Shane 黃士銘. All rights reserved.</p>
      </div>
    </div>
  </aside>

  <!-- Main content -->
  <main class="content">
    <!-- About / Autobiography page -->
    <section id="about" class="page">
      <header class="page-header">
        <h2 class="page-title" data-i18n="about.title">自傳</h2>
        <p class="page-lead" data-i18n="about.tagline">從跨領域歷練到軟體工程</p>
      </header>
      <div class="about-body" id="aboutBody"></div>
    </section>

    <!-- Resume page -->
    <section id="resume" class="page active">
      <div class="resume-section">
        <h3 class="resume-section-title" data-i18n="skills.title">技能</h3>
        <div class="skills-grid" id="skillsGrid"></div>
      </div>

      <div class="resume-section">
        <h3 class="resume-section-title" data-i18n="experience.title">工作經歷</h3>
        <div class="resume-list" id="experienceTimeline"></div>
      </div>

      <div class="resume-section">
        <h3 class="resume-section-title" data-i18n="education.title">學歷</h3>
        <div class="resume-list" id="educationTimeline"></div>
      </div>
    </section>

    <!-- Projects page -->
    <section id="projects" class="page">
      <header class="page-header">
        <h2 class="page-title" data-i18n="projects.title">作品集</h2>
      </header>
      <div class="projects-grid" id="projectsGrid"></div>
    </section>

    <!-- Contact page -->
    <section id="contact" class="page">
      <header class="page-header">
        <h2 class="page-title" data-i18n="contact.title">聯絡我</h2>
        <p class="page-lead" data-i18n="contact.intro">歡迎與我聯繫</p>
      </header>
      <div class="contact-links" id="contactLinks"></div>
    </section>
  </main>

  <script src="data/translations.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
